<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
<style>
body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#fceff9,#e0f7fa);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}
.card{
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    text-align:center;
    max-width:500px;
    animation:fadeIn 2s ease;
}
h1{
    font-family:'Great Vibes',cursive;
    font-size:48px;
    color:#e91e63;
    margin-bottom:10px;
}
.names{
    font-size:28px;
    font-weight:600;
    margin:20px 0;
}
.date{
    font-size:18px;
    margin:10px 0;
}
.location{
    color:#666;
}
button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:25px;
    background:#e91e63;
    color:white;
    font-size:16px;
    cursor:pointer;
}
button:hover{
    background:#d81b60;
}
@keyframes fadeIn{
    from{opacity:0;transform:translateY(30px);}
    to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<div class="card">
    <h1>You're Invited</h1>
    <p>Together with their families</p>

    <div class="names">
        Alice ❤️ Bob
    </div>

    <div class="date">
        April 20, 2026 · 5:00 PM
    </div>

    <div class="location">
        Sunset Garden Hotel<br>
        Singapore
    </div>

    <button onclick="alert('See you at our wedding! 💕')">
        RSVP
    </button>
</div>

</body>
</html>
